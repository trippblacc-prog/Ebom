<!DOCTYPE html>
<html>

    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact Us</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" type="text/css" href="style.css">

    </head>

    <body class="animated-bg">

        <nav class="top-nav">

            <a href="index.html" class="nav-link">Profile</a>

            <a href="about.html" class="nav-link">About</a>

            <a href="projects.html" class="nav-link">Projects</a>

            <a href="contactUs.html" class="nav-link">Contact</a>
            
        </nav>

        <main id="contact-form-root">

            <form data-testid="test-profile-card" id="contact-form" name="contact-us-form" method="GET" action="#">

                <h2 class="reveal reveal-up">Contact.</h2>

                <section class="form-elements reveal reveal-up">

                    <label for="contact-name">Full Name:</label>

                    <input
                    type="text"
                    id="contact-name"
                    data-testid="test-contact-name"
                    placeholder="First and Last Name"
                    name="name"
                    
                    />

                    <div id="name-error-div" class="error-msg hidden" data-testid="">Name Is Required</div>

                </section>

                <section class="form-elements reveal reveal-up">

                    <label for="contact-email">Email:</label>

                    <input
                    type="email"
                    id="contact-email"
                    data-testid="test-contact-email"
                    placeholder="name@mail.com"
                    name="email"
                    />

                    <div class="error-msg hidden">Valid email is required</div>

                </section>

                <section class="form-elements reveal reveal-up">

                    <label for="contact-subject">Subject:</label>

                    <input
                    type="text"
                    id="contact-subject"
                    data-testid="test-contact-subject"
                    
                    name="subject"
                    />

                    <div class="error-msg hidden" data-testid="test-contact-error-email">Subject is required</div>

                </section>

                <section class="form-elements reveal reveal-up">

                    <label for="contact-message">Message:</label>

                    <textarea
                    rows="12"
                    data-testid="test-contact-message"
                    id="contact-message"
                    placeholder="Type your message here"
                    minlength="10"
                    ></textarea>

                    <div class="error-msg hidden">Message is required</div>

                </section>

                <section class="form-elements">

                    <button id="submit-button" data-testid="test-contact-submit" >Submit</button>

                    <div class="sucess-msg hidden" id="" data-testid="test-contact-success">Message Sent Succesfully</div>

                </section>

            </form>   

        </main>
        <footer class="site-footer">
            <p>&copy; 2026 Built By Ebom Onwuegbute. All rights reserved.</p>
        </footer>

        <script type="text/javascript" src="validationform.js"></script>
        <script type="text/javascript" src="script.js"></script>
    </body>
</html>
